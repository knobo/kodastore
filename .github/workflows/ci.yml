name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: kodastore_test
          POSTGRES_USER: kodastore
          POSTGRES_PASSWORD: kodastore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        run: ./gradlew :domain:test :application:test
        # Integration tests run separately below

      - name: Integration Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/kodastore_test
          SPRING_DATASOURCE_USERNAME: kodastore
          SPRING_DATASOURCE_PASSWORD: kodastore
        run: ./gradlew :infrastructure:test
