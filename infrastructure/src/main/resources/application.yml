spring:
  application:
    name: kodastore

  datasource:
    url: jdbc:postgresql://localhost:5432/kodastore
    username: kodastore
    password: kodastore
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000
      pool-name: kodastore-pool

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  threads:
    virtual:
      enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  tomcat:
    max-connections: 10000
    accept-count: 1000
    threads:
      max: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    no.kodastore: DEBUG
    org.springframework.jdbc: INFO
