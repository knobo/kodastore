# KodaStore PostgreSQL configuration - tuned for event sourcing workloads

listen_addresses = '*'
max_connections = 200

# Memory
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 16MB
maintenance_work_mem = 256MB

# WAL - critical for append-heavy workload
wal_buffers = 64MB
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9

# Write performance - group commit
synchronous_commit = on
commit_delay = 100
commit_siblings = 5

# Parallelism
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8

# Logging
log_min_duration_statement = 100
